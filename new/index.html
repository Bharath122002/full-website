<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneaker Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>NIKEX</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#">Product</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
  <button class="btn">Explore</button>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>SUMMER STEP <br> COLLECTIONS</h1>
    <p>Best comfort shoes with premium design</p>
    <button>Shop Now</button>
  </div>

  <div class="hero-img">
    <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
  </div>
</section>

<section class="products">
  <h2>POPULAR PRODUCTS</h2>

  <div class="product-grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
      <h3>Running Shoes</h3>
      <p>$120</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
      <h3>Sneakers</h3>
      <p>$90</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
      <h3>Sport Shoes</h3>
      <p>$150</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1528701800489-20be3c1c1d4f">
      <h3>Casual Shoes</h3>
      <p>$110</p>
    </div>

  </div>
</section>

</body>
</html>
